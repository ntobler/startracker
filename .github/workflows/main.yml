name: Test develop CI/CD Pipeline

on:
  push:
    branches:
      - "**" # All branches
    tags-ignore:
      - "**" # Ignore all tags

permissions:
  contents: write
  packages: write # Needed for pushing to GHCR

jobs:
  check-dockerfile-changes:
    runs-on: ubuntu-22.04
    outputs:
      docker: ${{ steps.filter.outputs.docker }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          base: ${{ github.ref }}
          filters: |
            docker:
              - 'Dockerfile'

  build-docker:
    runs-on: ubuntu-22.04
    needs: check-dockerfile-changes
    if: needs.check-dockerfile-changes.outputs.docker == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: |
            linux/arm64
            linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/startracker-build:latest
            ghcr.io/${{ github.repository_owner }}/startracker-build:${{ github.sha }}

  test:
    name: Run Tests
    runs-on: ubuntu-22.04
    needs: build-docker
    container:
      image: ghcr.io/${{ github.repository_owner }}/startracker-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: poetry install
        env:
          POETRY_VIRTUALENVS_CREATE: false

      - name: Run cargo test
        run: poetry run cargo test

      - name: Run pytest
        run: poetry run pytest

  create-release:
    name: Create Release
    needs: test # Run after tests pass
    # if: startsWith(github.ref, 'refs/tags/v') # Only run for version tags
    runs-on: ubuntu-22.04
    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

  build-release:
    name: Build Release
    needs: create-release
    strategy:
      matrix:
        architecture: [arm64, amd64] # Changed x86-64 to amd64 for consistency
    runs-on: ${{ matrix.architecture == 'arm64' && 'ubuntu-22.04-arm' || 'ubuntu-22.04' }}
    container:
      image: ghcr.io/${{ github.repository_owner }}/startracker-build:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build in release mode
        run: cargo build --release --features cam

      - name: Upload executable
        run: |
          mv target/release/startracker target/release/startracker-${{ matrix.architecture }}
          gh release upload "${{ github.ref_name }}" "target/release/startracker-${{ matrix.architecture }}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
